name: CI/CD Pipeline

on:
  push:
    branches: [main] # Triggers deployment on push to main
  pull_request:
    branches: [main] # Triggers tests/build checks on PRs

jobs:
  client-ci-cd:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Lint and Typecheck
        run: |
          bun run lint
          bun x tsc --noEmit

      # Optional: Add your test script here if you have one
      # - name: Run Tests
        # run: bun test

      - name: Build OpenNext bundle
        if: github.event_name == 'pull_request'
        run: bun run build:cf && bunx opennextjs-cloudflare build --skipNextBuild
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy client to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  # --------------------------------------------------------
  # SERVER JOB: Hono + Drizzle + Cloudflare Workers + Bun
  # --------------------------------------------------------
  server-ci-cd:
    name: Server (Hono + Cloudflare)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Check Drizzle Schema & Typecheck
        run: |
          bun x drizzle-kit check
          bun x tsc --noEmit

      # Only deploy on push to main branch
      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: deploy --minify
